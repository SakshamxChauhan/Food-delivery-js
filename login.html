<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Order App - Login</title>
  <style>
    body {
      background: linear-gradient(120deg, #ffe259 0%, #ffa751 100%);
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background: #fff;
      padding: 2rem 1.5rem 1.5rem;
      box-shadow: 0 6px 36px rgba(44, 62, 80, 0.1);
      border-radius: 18px;
      max-width: 340px;
      width: 95%;
      text-align: center;
    }
    .pizza-logo {
      background: #fa5a2a;
      color: #fff;
      width: 75px;
      height: 75px;
      margin: -65px auto 1rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.3rem;
      border-radius: 50%;
      box-shadow: 0 2px 12px rgba(250,90,42,0.2);
    }
    .login-title {
      color: #fa5a2a;
      font-size: 1.8rem;
      font-weight: bold;
      margin-bottom: 0.2rem;
    }
    .login-desc {
      color: #555;
      font-size: 1rem;
      margin-bottom: 1.3rem;
    }
    .form-group {
      margin-bottom: 1rem;
      text-align: left;
    }
    label {
      font-weight: 500;
      display: block;
      margin-bottom: 0.23rem;
      color: #2b2b2b;
      font-size: 0.97rem;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.7rem 0.9rem;
      font-size: 1rem;
      border: 1px solid #fac098;
      border-radius: 8px;
      background: #faf7f2;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    input:focus {
      border-color: #fa5a2a;
    }
    .error-message {
      color: #dc3545;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }
    .login-btn {
      width: 100%;
      padding: 0.8rem 0;
      color: #fff;
      background: #fa5a2a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      margin-top: 0.7rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .login-btn:hover {
      background: #dd4413;
    }
    .forgot-link {
      display: block;
      font-size: 0.93rem;
      color: #fa5a2a;
      text-decoration: none;
      margin-top: 0.5rem;
    }
    @media (max-width: 480px) {
      .login-container {
        padding: 1.1rem 0.6rem;
        max-width: 98vw;
      }
      .pizza-logo {
        width: 52px;
        height: 52px;
        font-size: 1.4rem;
        margin: -40px auto .75rem auto;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="pizza-logo">🍕</div>
    <div class="login-title">Sign In</div>
    <div class="login-desc">Order your favorite pizza in a click.</div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email or Mobile</label>
        <input type="text" id="email" name="email" required placeholder="Enter email or mobile number">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter password">
      </div>
      <div class="error-message" id="errorMessage">Please enter valid credentials</div>
      <button type="submit" class="login-btn">Login</button>
      <a href="#" class="forgot-link">Forgot password?</a>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Simple validation - you can customize this
      if (email && password) {
        // Store user session (optional)
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userEmail', email);
        
        // Redirect to home page
        window.location.href = 'home.html';
      } else {
        // Show error message
        document.getElementById('errorMessage').style.display = 'block';
      }
    });
  </script>
</body>
</html>
