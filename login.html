<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Order App Login</title>
</head>
<body>
  <div class="login-container">
    <div class="pizza-logo">🍕</div>
    <div class="login-title">Sign In</div>
    <div class="login-desc">Order Your Favorite Pizza In Just One Click</div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email or Mobile</label>
        <input type="text" id="email" name="email" required placeholder="Enter email or mobile number">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter password">
      </div>
      <button type="submit" class="login-btn"><a href="home.html">Login</a> </button>
      <a href="#" class="forgot-link">Forgot password?</a>
    </form>
  </div>
<link rel="stylesheet" href="./login.css">
<script src="./login.js"></script>
</body>
</html>
